<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>merch</title>
    <link rel="stylesheet" href="/CSS/style-merch.css">

 <!-- CSS -->
 <link rel="stylesheet" href="/CSS/style-merch-navbar.css">
 <!-- Unicons CSS -->
 <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css" />
 <!-- JS -->
<script src="/JS/script.js" defer></script>

</head>
<body>


    <nav class="nav" style="z-index: 1;">
        <div style="position: absolute; left: 100px; color: black; font-weight: bold; background-color: greenyellow; font-style: italic;"> merch</div>
        <i class="uil uil-bars navOpenBtn" style="" id="searchIcon"; > 
          </i>
          <ul class="nav-links">
            <i class="uil uil-times navCloseBtn"></i>
            <li><a class="home" href="/html/accueil.html">home</a></li>
            <li><a class="videos" href="/html/videos.html">videos</a></li>
            <li><a class="music" href="/html/musique.html">music</a></li>
            <li><a class="merch" href="/html/merch.html">merch</a></li>
            <li><a class="contact" href="#">contact</a></li>
          </ul>
    
          
      </nav>
    <div class="container">
        <header>
            <h1 style="margin-top: 20px;" >LIST PRODUCT</h1>
            <div class="iconCart" style="margin-top: 15px;">
                <img src="/image-merch/icon.png">
                <div class="totalQuantity">0</div>
            </div>
        </header>
        <div class="listProduct">
            <!-- a checker images/1.webp -->
            <div class="item">
                <img src="images/1.webp" alt="">
                <h2>CoPilot / Black / Automatic</h2>
                <div class="price">$550</div>
                <button>Add To Cart</button>
            </div>

        </div>
    </div>

    <div class="cart">
        <h2>
            CART
        </h2>

        <div class="listCart">

            <!-- a checker images/1.webp -->

            <div class="item">
                <img src="images/1.webp">
                <div class="content">
                    <div class="name">CoPilot / Black / Automatic</div>
                    <div class="price">$550 / 1 product</div>
                </div>
                <div class="quantity">
                    <button>-</button>
                    <span class="value">3</span>
                    <button>+</button>
                </div>
            </div>
        </div>
        <div class="buttons">
            <div class="close">
                CLOSE
            </div>
            <div class="checkout">
                <a href="/checkout.html">CHECKOUT</a>
            </div>
        </div>
    </div>
    <script src="/JS/app.js"></script>
</body>
</html>
