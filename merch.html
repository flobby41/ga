<body>


    <nav class="nav">
        <div style="position: absolute; left: 100px; color: black; font-weight: bold; background-color: greenyellow; font-style: italic;"> merch</div>
        <!-- <i class="uil uil-bars navOpenBtn" style="z-index: 5;" id="searchIcon"; > ca c est le petit hamburger searchIcon-->

        <ul class="nav-links">
          <i class="uil uil-times navCloseBtn"></i>
          <li><a class="home" href="/accueil.html">home</a></li>
          <li><a class="videos" href="/videos.html">videos</a></li>
          <li><a class="music" href="/musique.html">music</a></li>
          <li><a class="merch" href="#">merch</a></li>
          <li><a class="contact" href="/contact.html">contact</a></li>
        </ul>
  
        
  
      </nav>









    <div class="container">
        <header>
            <h1>LIST PRODUCT</h1>
            <div class="iconCart">
                <img src="/image-merch/icon.png">
                <div class="totalQuantity">0</div>
            </div>
        </header>

        <div class="listProduct">

            <!-- a checker images/1.webp -->
            <div class="item">
                <img src="images/1.webp" alt="">
                <h2>CoPilot / Black / Automatic</h2>
                <div class="price">$550</div>
                <button>Add To Cart</button>
            </div>

        </div>
    </div>

    <div class="cart">
        <h2>
            CART
        </h2>

        <div class="listCart">

            <!-- a checker images/1.webp -->

            <div class="item">
                <img src="images/1.webp">
                <div class="content">
                    <div class="name">CoPilot / Black / Automatic</div>
                    <div class="price">$550 / 1 product</div>
                </div>
                <div class="quantity">
                    <button>-</button>
                    <span class="value">3</span>
                    <button>+</button>
                </div>
            </div>


        </div>

        <div class="buttons">
            <div class="close">
                CLOSE
            </div>
            <div class="checkout">
                <a href="/checkout.html">CHECKOUT</a>
            </div>
        </div>
    </div>


    <script src="/JS/app.js"></script>
