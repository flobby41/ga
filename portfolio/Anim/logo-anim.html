<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>


  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
      display: flex;
      justify-content: center;
      align-items: center;
      width:100%;
      min-height: 100vh;
      background:#111;
      animation: animate 3s linear infinite;
    }

    @keyframes animate  {

      0%{
        filter: hue-rotate(0deg);
      }
      100%{
        filter: hue-rotate(360deg);
      }
    }

    .img-box{
      width: 500px;
      height: 450px;
    }

    .img-box img{
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div class="img"> <img src="/img/TS_rond01.png" style="width: 100px;" alt=""></div>
  
</body>
</html>
